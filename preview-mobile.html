<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Preview Mobile — Andrea do Val</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1f1a;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    font-family: system-ui, sans-serif;
    color: #f5f1ea;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  h1 {
    font-family: "Cormorant Garamond", serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    opacity: 0.85;
  }
  .frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 54px;
    padding: 12px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
    position: relative;
  }
  .frame::before {
    content: "";
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #000;
    border-radius: 999px;
    z-index: 2;
  }
  .frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 42px;
    background: #f5f1ea;
  }
  .links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .links a {
    color: #d8cfc0;
    background: rgba(255,255,255,0.08);
    padding: 8px 14px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 13px;
    transition: background .2s;
  }
  .links a:hover { background: rgba(255,255,255,0.15); }
  .note { font-size: 12px; opacity: 0.5; max-width: 380px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Preview mobile · iPhone 14 Pro (390×844)</h1>
    <div class="frame">
      <iframe src="index.html"></iframe>
    </div>
    <div class="links">
      <a href="index.html" target="_blank">Abrir versão completa</a>
    </div>
    <div class="note">Use o scroll dentro do frame pra navegar. O botão flutuante verde abre o prompt de WhatsApp.</div>
  </div>
</body>
</html>
